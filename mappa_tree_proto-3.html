<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mappa Tree — Prototipo</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #090910; color: #ccc; font-family: 'Georgia', serif;
    height: 100vh; display: flex; flex-direction: column; align-items: center; overflow: hidden;
  }
  #header {
    width: 100%; padding: 14px 20px 10px;
    display: flex; justify-content: space-between; align-items: center;
    border-bottom: 1px solid #1a1a2a; flex-shrink: 0;
  }
  #header h1 { font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: #555; }
  #btn-restart {
    font-size: 9px; letter-spacing: 1px; text-transform: uppercase;
    color: #444; background: transparent; border: 1px solid #252535;
    border-radius: 2px; padding: 5px 10px; cursor: pointer;
  }
  #btn-restart:hover { color: #aaa; border-color: #555; }

  #main { flex: 1; width: 100%; display: flex; overflow: hidden; }
  #tree-wrap { flex: 1; position: relative; overflow: hidden; }
  #tree-area { position: absolute; inset: 0; overflow-y: auto; overflow-x: hidden; }
  #tree-area::-webkit-scrollbar { width: 4px; }
  #tree-area::-webkit-scrollbar-thumb { background: #1e1e2e; }
  #scroll-content { position: relative; width: 100%; }
  canvas { position: absolute; top: 0; left: 0; }
  #nodes-layer { position: absolute; top: 0; left: 0; width: 100%; pointer-events: none; }

  .node {
    position: absolute; transform: translate(-50%, -50%);
    display: flex; flex-direction: column; align-items: center; gap: 5px; pointer-events: all;
  }
  .node-circle {
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    font-size: 15px; transition: transform 0.15s, box-shadow 0.15s; flex-shrink: 0;
  }
  .node-label {
    font-size: 8px; letter-spacing: 1px; text-transform: uppercase;
    text-align: center; line-height: 1.5; white-space: nowrap; color: #555;
  }
  .nc-storia  { width:40px;height:40px; background:#0c150c; border:1.5px solid #1a3a1a; color:#2e6a2e; }
  .nc-corrente{ width:52px;height:52px; background:#10101e; border:2px solid #8080c0; color:#c0c0e0; }
  @keyframes pulse-c { 0%,100%{box-shadow:0 0 8px rgba(120,120,200,0.2);} 50%{box-shadow:0 0 22px rgba(120,120,200,0.5);} }
  .nc-corrente { animation: pulse-c 2.2s ease-in-out infinite; }
  .nc-scelta  { width:46px;height:46px; background:#0e0e1c; border:2px solid #2a2a55; color:#7070b0; cursor:pointer; }
  .nc-scelta:hover { border-color:#7070d0; box-shadow:0 0 14px rgba(80,80,200,0.35); transform:scale(1.1); color:#c0c0ff; }

  /* opzione "Nulla" — stile più tenue */
  .nc-nulla   { width:42px;height:42px; background:#0c0c10; border:2px dashed #303040; color:#454555; cursor:pointer; }
  .nc-nulla:hover { border-color:#505068; color:#7a7a90; transform:scale(1.08); }

  /* tier qualità scelta (DOPO scelta/nulla così override border-color): verde/giallo/rosso */
  .nc-tier-best  { background:#0a160c; border-color:#2a6a3a; color:#5ac080; }
  .nc-tier-best:hover  { border-color:#40b060; box-shadow:0 0 14px rgba(60,200,100,0.4); }
  .nc-tier-mid   { background:#16140a; border-color:#6a5a20; color:#c0a850; }
  .nc-tier-mid:hover   { border-color:#b09030; box-shadow:0 0 14px rgba(200,170,60,0.4); }
  .nc-tier-worst { background:#160a0a; border-color:#6a2a2a; color:#c06060; }
  .nc-tier-worst:hover { border-color:#b04040; box-shadow:0 0 14px rgba(200,70,70,0.4); }
  /* tier neutro: Nulla facoltativo (a costo zero) — grigio neutro */
  .nc-tier-neutro { background:#101014; border-color:#3a3a44; color:#8a8a95; }
  .nc-tier-neutro:hover { border-color:#55555f; box-shadow:0 0 12px rgba(120,120,140,0.3); }
  /* sentiero nella storia: tonalità leggermente diversa per distinguerlo dalle attività */
  .nc-sen-storia { background:#0c1216; border-color:#1a3540; color:#4a8aa0; }

  /* nodo finale */
  .nc-fine    { width:52px;height:52px; background:#160c16; border:2px solid #5a2a5a; color:#a060a0; }

  #log-panel { width:140px; flex-shrink:0; border-left:1px solid #1a1a2a; display:flex; flex-direction:column; overflow:hidden; }
  #log-title { font-size:8px; letter-spacing:2px; text-transform:uppercase; color:#383848; padding:12px 12px 8px; border-bottom:1px solid #151522; flex-shrink:0; }
  #log-entries { flex:1; overflow-y:auto; display:flex; flex-direction:column; }
  #log-entries::-webkit-scrollbar { width:3px; }
  #log-entries::-webkit-scrollbar-thumb { background:#1e1e2e; }
  .log-entry { padding:8px 12px; border-bottom:1px solid #111118; display:flex; flex-direction:column; gap:3px; }
  .log-entry.log-fisso  { background:#0a0a12; }
  .log-entry.log-scelta { background:#090912; }
  .log-entry.log-vuoto  { background:#080808; opacity:0.6; }
  .log-ora  { font-size:9px;  color:#404055; }
  .log-nome { font-size:10px; color:#7070a0; }
  .log-dur  { font-size:8px;  color:#303045; }
  .log-entry.log-corrente .log-nome { color:#a0a0d0; }
  .log-entry.log-corrente .log-ora  { color:#606080; }
  #log-now { padding:10px 12px; background:#0d0d1e; border-top:1px solid #1e1e35; flex-shrink:0; }
  #log-now-ora   { font-size:11px; color:#6060a0; letter-spacing:1px; margin-bottom:2px; }
  #log-now-label { font-size:8px;  color:#383850; letter-spacing:1px; text-transform:uppercase; }

  /* ── MOSTRI ── */
  .nc-mostri-lon { width:40px;height:40px; background:#160808; border:2px solid #3a1a1a; color:#8a4a4a; }
  .nc-mostri-cal { width:46px;height:46px; background:#1e0808; border:2px solid #6a2020; color:#c05050;
                   animation: pulse-cal 1s ease-in-out infinite; }
  .nc-mostri-rag { width:54px;height:54px; background:#2a0606; border:2px solid #a02020; color:#ff5050;
                   animation: pulse-rag 0.5s ease-in-out infinite; }
  @keyframes pulse-cal { 0%,100%{box-shadow:0 0 6px rgba(180,40,40,0.3);} 50%{box-shadow:0 0 16px rgba(180,40,40,0.6);} }
  @keyframes pulse-rag { 0%,100%{box-shadow:0 0 10px rgba(255,40,40,0.5);} 50%{box-shadow:0 0 26px rgba(255,40,40,0.9);} }

  /* ── HUD: barra tempo residuo ── */
  #hud {
    position:absolute; top:8px; left:50%; transform:translateX(-50%);
    width:70%; max-width:280px; z-index:50; pointer-events:none;
    display:flex; flex-direction:column; align-items:center; gap:4px;
  }
  #timebar-wrap { width:100%; height:6px; background:#1a0a0a; border-radius:3px; overflow:hidden; border:1px solid #2a1010; }
  #timebar { height:100%; background:linear-gradient(90deg,#a02020,#ff6040); transition:width 0.2s linear; }
  #timebar-label { font-size:9px; letter-spacing:1px; color:#8a5050; text-transform:uppercase; }

  /* ── nodo galleggiante (mostri fuori schermo in basso) ── */
  #floating-monsters {
    position:absolute; bottom:14px; left:50%; transform:translateX(-50%);
    z-index:50; display:none; flex-direction:column; align-items:center; gap:3px;
    pointer-events:none; opacity:0.85;
  }
  #floating-monsters .fm-circle {
    width:38px;height:38px;border-radius:50%; display:flex;align-items:center;justify-content:center;
    background:#160808;border:2px dashed #5a2020;color:#b05050;font-size:14px;
    animation: bob 1.6s ease-in-out infinite;
  }
  @keyframes bob { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-4px);} }
  #floating-monsters .fm-label { font-size:8px;letter-spacing:1px;color:#7a4040;text-transform:uppercase; }

  /* ── game over overlay ── */
  #gameover {
    position:absolute; inset:0; z-index:100; display:none;
    background:rgba(20,2,2,0.82); backdrop-filter:blur(2px);
    flex-direction:column; align-items:center; justify-content:center; gap:14px;
  }
  #gameover .go-icon { font-size:48px; animation: pulse-rag 0.6s ease-in-out infinite; }
  #gameover .go-title { font-size:18px; letter-spacing:3px; text-transform:uppercase; color:#ff5050; }
  #gameover .go-sub { font-size:11px; color:#a06060; letter-spacing:1px; }
  #gameover button {
    margin-top:8px; font-size:11px; letter-spacing:2px; text-transform:uppercase;
    color:#ccc; background:transparent; border:1px solid #6a2020; border-radius:3px;
    padding:8px 18px; cursor:pointer;
  }
  #gameover button:hover { background:#2a0808; border-color:#a02020; }
</style>

</head>
<body>
<div id="header">
  <h1>🗺 Mappa — Prototipo</h1>
  <button id="btn-restart" onclick="restart()">↺ Ricomincia</button>
</div>
<div id="main">
  <div id="tree-wrap">
    <div id="tree-area">
      <div id="scroll-content">
        <canvas id="cvs"></canvas>
        <div id="nodes-layer"></div>
      </div>
    </div>
    <!-- HUD fisso sopra l'area (non scrolla) -->
    <div id="hud">
      <div id="timebar-label">distanza mostri</div>
      <div id="timebar-wrap"><div id="timebar"></div></div>
    </div>
    <!-- promemoria mostri quando sono fuori schermo in basso -->
    <div id="floating-monsters">
      <div class="fm-circle">👾</div>
      <div class="fm-label" id="fm-label">mostri · — nodi</div>
    </div>
    <!-- game over -->
    <div id="gameover">
      <div class="go-icon">👹</div>
      <div class="go-title">Raggiunti</div>
      <div class="go-sub">I mostri ti hanno raggiunto.</div>
      <button onclick="restart()">↺ Riprova</button>
    </div>
  </div>
  <div id="log-panel">
    <div id="log-title">Percorso</div>
    <div id="log-entries"></div>
    <div id="log-now">
      <div id="log-now-ora">—:——</div>
      <div id="log-now-label">ora attuale</div>
    </div>
  </div>
</div>
<script>
function hm(h,m=0){ return h*60+m; }
function fmt(min){ const h=Math.floor(min/60),m=min%60; return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`; }

const FISSI = [
  { id:'sveglia', label:'Sveglia', icon:'🌅', t:hm(8),     tEnd:hm(8)     },
  { id:'lav1',    label:'Lavoro',  icon:'💼', t:hm(10,30), tEnd:hm(12)    },
  { id:'pranzo',  label:'Pranzo',  icon:'🍝', t:hm(12),    tEnd:hm(12,30) },
  { id:'lav2',    label:'Lavoro',  icon:'💼', t:hm(12,30), tEnd:hm(15)    },
  { id:'lav3',    label:'Lavoro',  icon:'💼', t:hm(18,30), tEnd:hm(19,30) },
  { id:'cena',    label:'Cena',    icon:'🍽', t:hm(19,30), tEnd:hm(20)    },
  { id:'lav4',    label:'Lavoro',  icon:'💼', t:hm(20),    tEnd:hm(23)    },
  { id:'nanna',   label:'Nanna',   icon:'🌙', t:hm(23,30), tEnd:hm(23,30) },
  { id:'riposo',  label:'Riposo',  icon:'😴', t:hm(24),    tEnd:hm(24)    },
];
const ATTIVITA = [
  // sup = modifica al tempoResiduo in secondi (positivo = ci allontana dai mostri)
  // limiter attività = 1x ciascuna
  { id:'allenamento', label:'Allenamento', icon:'🏋', dur:60,  sup:+8  },
  { id:'studio',      label:'Studio',      icon:'📖', dur:120, sup:+5  },
  { id:'relax',       label:'Relax',       icon:'🛋', dur:30,  sup:+3  },
  { id:'progetto',    label:'Progetto',    icon:'🛠', dur:180, sup:+12 },
];

// SENTIERI: opzioni "facili" dei bivi facoltativi (prima/dopo ogni fisso).
// limiter sentieri = 2x ciascuno. "persistente" = se scelto PRIMA di un fisso,
// ricompare DOPO lo stesso fisso come nodo già-fatto (andata/ritorno), riapplicando
// effetto e consumando di nuovo la durata.
const SENTIERI = [
  { id:'bici',       label:'Bici',      icon:'🚲', dur:20, sup:+4, persistente:true  },
  { id:'leggere',    label:'Leggere',   icon:'📕', dur:30, sup:+3, persistente:false },
  { id:'stretching', label:'Stretching',icon:'🤸', dur:15, sup:+2, persistente:false },
];

const LIMITER = { attivita:1, sentiero:2 };  // usi massimi per id

// ── CONFIG MOSTRI (Architettura 1: una sola variabile = tempoResiduo in secondi) ──
const MOSTRI = {
  tempoIniziale:   20,   // secondi di distacco alla partenza
  perNodo:         6,    // secondi che valgono "1 nodo di distanza" (per disegnare k)
  supNulla:        -7,   // "Nulla" avvicina i mostri
  tickPerSecondo:  1,    // quanti secondi di tempoResiduo si perdono per ogni secondo reale di attesa
  sogliaCalcagna:  1,    // k <= questo valore ⇒ fase "alle calcagna"
};

let state = null;
let tickTimer = null;

function nextFisso(tDopo){ return FISSI.find(f => f.t > tDopo) || null; }

// Conta quante volte un id è già stato usato nel percorso (per il limiter)
function usiDi(id){
  return state.percorso.filter(s => (s.tipo==='scelta'||s.tipo==='sentiero') && s.data && s.data.id===id).length;
}

// Tempo disponibile nella finestra libera corrente (fino al prossimo fisso)
function tempoFinestra(){
  const prox = nextFisso(state.tCorrente);
  return prox ? (prox.t - state.tCorrente) : 0;
}

// Opzioni ATTIVITÀ disponibili (fase 'attivita'): filtro durata + limiter 1x + esclusione ultima
function opzioniAttivita(){
  const disp = tempoFinestra();
  return ATTIVITA.filter(a =>
    a.dur <= disp &&
    a.id !== state.ultimaSceltaId &&
    usiDi(a.id) < LIMITER.attivita
  );
}

// Opzioni SENTIERI disponibili (fasi 'fac-prima'/'fac-dopo'): filtro durata + limiter 2x + esclusione ultima
function opzioniSentieri(){
  const disp = tempoFinestra();
  return SENTIERI.filter(s =>
    s.dur <= disp &&
    s.id !== state.ultimaSceltaId &&
    usiDi(s.id) < LIMITER.sentiero
  );
}

// Calcola le opzioni della fase corrente (lista normalizzata di item)
function calcolaOpzioni(){
  if(state.fase === 'attivita'){
    return { kind:'attivita', items: opzioniAttivita() };
  } else { // fac-prima | fac-dopo
    return { kind:'sentieri', items: opzioniSentieri() };
  }
}

// ── MOSTRI: fase e distanza derivate dal solo tempoResiduo ──
function distanzaNodi(){
  // k = quanti nodi sotto il corrente sono i mostri (derivato dal tempo)
  if(state.tempoResiduo <= 0) return 0;                 // raggiunti: stesso nodo
  return Math.max(1, Math.ceil(state.tempoResiduo / MOSTRI.perNodo));
}
function faseMostri(){
  if(state.tempoResiduo <= 0) return 'raggiunti';
  const k = distanzaNodi();
  if(k <= MOSTRI.sogliaCalcagna) return 'calcagna';
  return 'lontani';
}

// Applica una modifica al tempo (dalle scelte). Se scende a <=0 → raggiunti.
function applicaSuperamento(delta){
  state.tempoResiduo += delta;
  if(state.tempoResiduo <= 0){
    state.tempoResiduo = 0;
    raggiunti();
  }
}

function raggiunti(){
  state.gameOver = true;
  fermaTick();
}

// ── TICK real-time: i secondi scorrono mentre si esita al bivio ──
function avviaTick(){
  fermaTick();
  state.lastTick = Date.now();
  tickTimer = setInterval(() => {
    if(!state || state.fine || state.gameOver){ fermaTick(); return; }
    const now = Date.now();
    const dt = (now - state.lastTick) / 1000;
    state.lastTick = now;
    state.tempoResiduo -= dt * MOSTRI.tickPerSecondo;
    if(state.tempoResiduo <= 0){
      state.tempoResiduo = 0;
      raggiunti();
      render();   // render completo solo al game over (mostra overlay)
      return;
    }
    tickUpdate();  // aggiornamento LEGGERO: non ricostruisce l'albero, non forza lo scroll
  }, 200);
}
function fermaTick(){
  if(tickTimer){ clearInterval(tickTimer); tickTimer = null; }
}

function restart(){
  fermaTick();
  const sv = FISSI[0];
  state = {
    percorso: [{ tipo:'fisso', data:sv, tStart:sv.t, tEnd:sv.tEnd }],
    tCorrente: sv.tEnd,
    ultimaSceltaId: null,
    fase: null,                 // impostata da entraInFinestra()
    persistentiPendenti: [],    // sentieri persistenti scelti PRIMA, da applicare DOPO
    opzioniCorrente: [],
    fine: false,
    // ── stato mostri ──
    tempoResiduo: MOSTRI.tempoIniziale,
    gameOver: false,
    lastTick: Date.now(),
  };
  // Dopo la sveglia (fisso appena messo) entriamo nella finestra: fac-dopo (con eventuali persistenti)
  entraInFinestra();
  render();
  avviaTick();
}

// Applica i sentieri persistenti pendenti come nodi GIÀ FATTI (andata→ritorno automatico)
function applicaPersistentiPendenti(){
  if(!state.persistentiPendenti.length) return;
  // Li applichiamo in ordine, ognuno consuma durata e riapplica sup, se c'è tempo
  const ancora = [];
  for(const s of state.persistentiPendenti){
    if(s.dur <= tempoFinestra()){
      state.percorso.push({ tipo:'sentiero', data:s, tStart:state.tCorrente, tEnd:state.tCorrente+s.dur, auto:true });
      state.tCorrente += s.dur;
      applicaSuperamento(s.sup || 0);
      if(state.gameOver) return;
    }
    // se non c'è tempo, il ritorno semplicemente non si fa (finestra troppo corta)
  }
  state.persistentiPendenti = ancora;
}

// Entra in una nuova finestra libera dopo aver agganciato un fisso: fase iniziale 'fac-dopo'
function entraInFinestra(){
  // Applica prima i ritorni automatici dei persistenti
  applicaPersistentiPendenti();
  if(state.gameOver){ render(); return; }
  state.ultimaSceltaId = null;
  state.fase = 'fac-dopo';
  ricalcolaOpzioni();
}

// Aggiorna state.opzioniCorrente in base alla fase; se la fase non offre nulla di utile, NON salta
// da sola (l'avanzamento di fase è guidato da "Nulla"). Ma se è fac-* senza prossimo fisso → fine.
function ricalcolaOpzioni(){
  const prox = nextFisso(state.tCorrente);
  if(!prox){
    state.fine = true;
    state.opzioniCorrente = [];
    fermaTick();
    return;
  }
  const { items } = calcolaOpzioni();
  state.opzioniCorrente = items;
}

// Scelta di un'ATTIVITÀ (fase 'attivita')
function scegliAttivita(id){
  if(!state || state.fine || state.gameOver) return;
  if(state.fase !== 'attivita') return;
  const att = ATTIVITA.find(a => a.id === id);
  if(!att) return;
  if(att.dur > tempoFinestra() || usiDi(att.id) >= LIMITER.attivita) return;
  state.percorso.push({ tipo:'scelta', data:att, tStart:state.tCorrente, tEnd:state.tCorrente+att.dur });
  state.tCorrente += att.dur;
  state.ultimaSceltaId = att.id;
  applicaSuperamento(att.sup || 0);
  if(state.gameOver){ render(); return; }
  ricalcolaOpzioni();
  render();
}

// Scelta di un SENTIERO (fasi 'fac-prima' / 'fac-dopo')
function scegliSentiero(id){
  if(!state || state.fine || state.gameOver) return;
  if(state.fase !== 'fac-prima' && state.fase !== 'fac-dopo') return;
  const s = SENTIERI.find(x => x.id === id);
  if(!s) return;
  if(s.dur > tempoFinestra() || usiDi(s.id) >= LIMITER.sentiero) return;
  state.percorso.push({ tipo:'sentiero', data:s, tStart:state.tCorrente, tEnd:state.tCorrente+s.dur });
  state.tCorrente += s.dur;
  state.ultimaSceltaId = s.id;
  applicaSuperamento(s.sup || 0);
  // Se persistente e scelto PRIMA di un fisso → registralo per il ritorno automatico dopo il fisso
  if(s.persistente && state.fase === 'fac-prima'){
    state.persistentiPendenti.push(s);
  }
  if(state.gameOver){ render(); return; }
  ricalcolaOpzioni();
  render();
}

// "Nulla": fa avanzare alla fase successiva (o aggancia il fisso). Penalità solo in 'attivita'.
function scegliNulla(){
  if(!state || state.fine || state.gameOver) return;

  // Penalità mostri solo per il "Nulla" delle attività; nei facoltativi è neutro (0).
  if(state.fase === 'attivita'){
    applicaSuperamento(MOSTRI.supNulla);
    if(state.gameOver){ render(); return; }
  }

  state.ultimaSceltaId = null;

  if(state.fase === 'fac-dopo'){
    state.fase = 'attivita';
    ricalcolaOpzioni();
    render();
    return;
  }
  if(state.fase === 'attivita'){
    state.fase = 'fac-prima';
    ricalcolaOpzioni();
    render();
    return;
  }
  if(state.fase === 'fac-prima'){
    // Chiudiamo la finestra: tempo vuoto fino al fisso, poi aggancio
    chiudiFinestraEAggancia();
    return;
  }
}

// Riempie il tempo vuoto residuo, aggancia il/i fisso/i e riapre la finestra successiva
function chiudiFinestraEAggancia(){
  const prox = nextFisso(state.tCorrente);
  if(!prox){ state.fine = true; state.opzioniCorrente = []; fermaTick(); render(); return; }
  const vuoto = prox.t - state.tCorrente;
  if(vuoto > 0){
    state.percorso.push({ tipo:'vuoto', data:{ label:'(vuoto)', icon:'·' }, tStart:state.tCorrente, tEnd:prox.t });
  }
  state.tCorrente = prox.t;
  avanzaFissi();
}

// Trova il primo fisso NON ancora nel percorso che inizia a tempo <= tCorrente
function fissoDaAgganciare(){
  const ultimoFisso = [...state.percorso].reverse().find(s=>s.tipo==='fisso');
  const ultimoT = ultimoFisso ? ultimoFisso.data.t : -1;
  return FISSI.find(f => f.t > ultimoT && f.t <= state.tCorrente) || null;
}

function avanzaFissi(){
  // Inserisce i nodi fissi raggiunti. Guard contro loop infinito.
  let guard = 0;
  let changed = true;
  while(changed && guard < 50){
    guard++;
    changed = false;
    const prox = fissoDaAgganciare();
    if(prox){
      state.percorso.push({ tipo:'fisso', data:prox, tStart:prox.t, tEnd:prox.tEnd });
      state.tCorrente = Math.max(state.tCorrente, prox.tEnd);
      state.ultimaSceltaId = null;
      changed = true;
    }
  }

  const prox = nextFisso(state.tCorrente);
  if(!prox){
    state.fine = true;
    state.opzioniCorrente = [];
    fermaTick();
    render();
    return;
  }
  // Nuova finestra dopo l'aggancio
  entraInFinestra();
  render();
}

// ── LAYOUT ──────────────────────────────────
// CAMERA FISSA (Opzione A): il nodo corrente (N) è SEMPRE inchiodato in ALTO.
// Le opzioni del bivio stanno SOPRA il corrente (più in alto).
// La storia (N-1, N-2, ...) cresce verso il BASSO.
// Avanzi cliccando verso l'alto; il percorso fatto scorre sotto.
const NODE_H     = 120;
const PAD_BOT    = 80;    // spazio sotto il nodo più in basso della storia
const ANCHOR_FRAC = 0.78; // posizione del corrente: 78% dell'altezza (vicino al fondo, mobile)

function computeLayout(W, viewH){
  const CX     = W / 2;
  const SPREAD = 78;
  const nodes=[], edges=[];

  const n = state.percorso.length;
  const opz = state.opzioniCorrente;
  const prox = nextFisso(state.tCorrente);
  // Siamo in un bivio attivo se c'è una fase impostata, non è finita, e c'è un prossimo fisso
  const bivioAttivo = !state.fine && !state.gameOver && prox && state.fase;
  const inFacoltativo = state.fase === 'fac-prima' || state.fase === 'fac-dopo';
  // "Nulla" appare SEMPRE in un bivio attivo (serve anche solo per avanzare di fase)
  const mostraNulla = bivioAttivo;
  const hasOpz = (opz.length > 0 || mostraNulla);

  // Posizione FISSA del corrente: proporzionale all'altezza, vicino al fondo.
  const yCorrente = Math.round(viewH * ANCHOR_FRAC);

  // La storia scende SOTTO il corrente
  function yPercorso(i){
    return yCorrente + (n - 1 - i) * NODE_H;
  }
  const yOpzioni = yCorrente - NODE_H;

  const yBottomMost = yPercorso(0);
  const totalH = Math.max(viewH, yBottomMost + PAD_BOT);

  // Storia + corrente
  for(let i = 0; i < n; i++){
    const step = state.percorso[i];
    let role = i===n-1 ? 'corrente' : 'storia';
    nodes.push({ key:`p${i}`, x:CX, y:yPercorso(i), step, role });
    if(i > 0) edges.push({ from:`p${i-1}`, to:`p${i}`, style:'storia' });
  }

  // Opzioni sopra il corrente
  if(hasOpz){
    // item.kind: 'att' (attività), 'sen' (sentiero), 'nulla'
    let items;
    if(inFacoltativo){
      items = opz.map(s => ({ kind:'sen', data:s, sup:s.sup }));
    } else {
      items = opz.map(a => ({ kind:'att', data:a, sup:a.sup }));
    }
    if(mostraNulla){
      // Nulla facoltativo = neutro (sup 0); Nulla attività = penalità
      const nullaSup = inFacoltativo ? 0 : MOSTRI.supNulla;
      items.push({ kind:'nulla', sup:nullaSup, neutro:inFacoltativo });
    }

    // Tier colore. Il Nulla facoltativo (neutro) NON entra nel ranking: tier dedicato.
    const ranked = items.filter(it => !it.neutro);
    const sups = ranked.map(it => it.sup);
    const maxSup = sups.length ? Math.max(...sups) : 0;
    const minSup = sups.length ? Math.min(...sups) : 0;
    items.forEach(it => {
      if(it.neutro){ it.tier = 'neutro'; return; }
      if(maxSup === minSup) it.tier = 'mid';
      else if(it.sup === maxSup) it.tier = 'best';
      else if(it.sup === minSup) it.tier = 'worst';
      else it.tier = 'mid';
    });

    const total  = items.length;
    const spread = SPREAD * (total - 1);
    const startX = CX - spread / 2;
    items.forEach((it, oi) => {
      const xo = total===1 ? CX : startX + (spread/(total-1))*oi;
      nodes.push({ key:`opt${oi}`, x:xo, y:yOpzioni, item:it, role:'opzione' });
      edges.push({ from:`p${n-1}`, to:`opt${oi}`, style:'futura' });
    });
  }

  // ── MOSTRI: posizionati k nodi SOTTO il corrente (più in basso nella storia) ──
  const fase = faseMostri();
  const k    = distanzaNodi();
  // y assoluta dei mostri: k nodi sotto il corrente
  const yMostriAbs = yCorrente + Math.max(k,0.4) * NODE_H;
  nodes.push({
    key: 'mostri',
    x: CX,
    y: yMostriAbs,
    role: 'mostri',
    fase, k,
  });
  // Edge tratteggiato rosso dal nodo più in basso della storia (o corrente) verso i mostri
  edges.push({ from:'p0', to:'mostri', style:'mostri' });

  // Estendi l'altezza totale per includere i mostri se stanno sotto la sveglia
  const totalH2 = Math.max(totalH, yMostriAbs + PAD_BOT);

  return { nodes, edges, totalH: totalH2, yCorrente, yMostriAbs, fase, k };
}

let lastLayout = null;

function render(forzaScroll = true){
  const area = document.getElementById('tree-area');
  const content = document.getElementById('scroll-content');
  const W = area.clientWidth;
  const viewH = area.clientHeight;

  const { nodes, edges, totalH, yCorrente, yMostriAbs, fase, k } = computeLayout(W, viewH);
  lastLayout = { yCorrente, yMostriAbs, fase, k };
  content.style.height = totalH + 'px';

  const cvs = document.getElementById('cvs');
  cvs.width = W; cvs.height = totalH;
  cvs.style.width = W+'px'; cvs.style.height = totalH+'px';
  const ctx = cvs.getContext('2d');
  ctx.clearRect(0,0,W,totalH);

  const map={}; nodes.forEach(n => map[n.key]=n);
  edges.forEach(e => {
    const a=map[e.from], b=map[e.to]; if(!a||!b) return;
    ctx.beginPath(); ctx.moveTo(a.x,a.y);
    const cy=(a.y+b.y)/2;
    ctx.bezierCurveTo(a.x,cy,b.x,cy,b.x,b.y);
    if(e.style==='storia')      { ctx.strokeStyle='#1a3a1a'; ctx.lineWidth=1.5; ctx.setLineDash([]); }
    else if(e.style==='futura') { ctx.strokeStyle='#2a2a50'; ctx.lineWidth=1.5; ctx.setLineDash([5,5]); }
    else if(e.style==='mostri') { ctx.strokeStyle='#5a1a1a'; ctx.lineWidth=1.5; ctx.setLineDash([3,5]); }
    else                        { ctx.strokeStyle='#1a1a30'; ctx.lineWidth=1;   ctx.setLineDash([3,7]); }
    ctx.stroke(); ctx.setLineDash([]);
  });

  const layer = document.getElementById('nodes-layer');
  layer.style.height = totalH+'px';
  layer.querySelectorAll('.node').forEach(n=>n.remove());
  nodes.forEach(n => {
    const el=document.createElement('div');
    el.className='node';
    el.style.left=n.x+'px'; el.style.top=n.y+'px';
    let cc='',icon='',top='',bot='',oc='';

    if(n.role==='storia'){
      const s=n.step;
      if(s.tipo==='vuoto'){ cc='nc-nulla'; icon='·'; top='vuoto'; bot=(s.tEnd-s.tStart)+'min'; }
      else if(s.tipo==='sentiero'){ cc='nc-storia nc-sen-storia'; icon=s.data.icon; top=s.data.label + (s.auto?' ↩':''); bot=(s.auto?'ritorno':''); }
      else { cc='nc-storia'; icon=s.data.icon; top=s.data.label; if(s.tipo==='fisso') bot=fmt(s.tStart); }
    }
    else if(n.role==='corrente'){
      const s=n.step;
      const isFine = state.fine && s.data.id==='riposo';
      cc = isFine ? 'nc-fine' : 'nc-corrente';
      icon=s.data.icon; top=s.data.label;
      bot = s.tipo==='fisso' ? fmt(s.tEnd) : (s.auto?'ritorno':'');
    }
    else if(n.role==='opzione'){
      const supTxt = (v) => v>0 ? `+${v}s` : (v<0 ? `${v}s` : '0s');
      const tierCls = 'nc-tier-' + (n.item.tier || 'mid');
      if(n.item.kind==='nulla'){
        cc='nc-nulla '+tierCls; icon='✕'; top='Nulla'; bot=supTxt(n.item.sup); oc='scegliNulla()';
      } else if(n.item.kind==='sen'){
        const s=n.item.data;
        cc='nc-scelta '+tierCls; icon=s.icon; top=s.label + (s.persistente?' ↪':'');
        bot=`${s.dur}min · ${supTxt(s.sup)}`; oc=`scegliSentiero('${s.id}')`;
      } else { // att
        const a=n.item.data;
        cc='nc-scelta '+tierCls; icon=a.icon; top=a.label;
        bot=`${a.dur}min · ${supTxt(a.sup)}`; oc=`scegliAttivita('${a.id}')`;
      }
    }
    else if(n.role==='mostri'){
      el.classList.add('node-mostri');
      if(n.fase==='raggiunti'){ cc='nc-mostri-rag'; icon='👹'; top='Raggiunti!'; }
      else if(n.fase==='calcagna'){ cc='nc-mostri-cal'; icon='👹'; top='Alle calcagna'; }
      else { cc='nc-mostri-lon'; icon='👾'; top='Mostri'; bot=`${n.k} nodi`; }
    }

    el.innerHTML=`
      <div class="node-circle ${cc}" ${oc?`onclick="${oc}"`:''}>${icon}</div>
      <div class="node-label">${top}${bot?`<br><span style="color:#303050;font-size:7px">${bot}</span>`:''}</div>`;
    layer.appendChild(el);
  });

  renderLog();

  // HUD + mostri (parti leggere, condivise col tick)
  aggiornaHUDeMostri();

  // Game over overlay
  document.getElementById('gameover').style.display = state.gameOver ? 'flex' : 'none';

  // Camera fissa: forza lo scroll SOLO dopo un cambio di percorso (non durante il tick).
  if(forzaScroll){
    requestAnimationFrame(() => {
      const target = yCorrente - viewH * ANCHOR_FRAC;
      area.scrollTop = Math.max(0, target);
      aggiornaFloating();  // ricalcola il floating dopo lo scroll
    });
  } else {
    aggiornaFloating();
  }
}

// ── Aggiorna HUD (barra tempo) e posizione/stile del nodo mostri, SENZA ricostruire l'albero ──
function aggiornaHUDeMostri(){
  if(!state) return;
  const fase = faseMostri();
  const k = distanzaNodi();

  // Barra tempo
  const tb = document.getElementById('timebar');
  if(tb){
    const pct = Math.max(0, Math.min(100, (state.tempoResiduo / MOSTRI.tempoIniziale) * 100));
    tb.style.width = pct + '%';
    const faseTxt = state.fine ? 'fine' :
      state.fase==='fac-dopo' ? 'facoltativo (dopo)' :
      state.fase==='fac-prima' ? 'facoltativo (prima)' :
      state.fase==='attivita' ? 'tempo libero' : '';
    document.getElementById('timebar-label').textContent =
      fase==='raggiunti' ? 'RAGGIUNTI' :
      `${faseTxt} · ${state.tempoResiduo.toFixed(0)}s · ${k} nodi`;
  }

  // Riposiziona il nodo mostri già presente nel DOM (senza ricrearlo)
  const layer = document.getElementById('nodes-layer');
  const area = document.getElementById('tree-area');
  if(layer && lastLayout){
    const yMostriAbs = lastLayout.yCorrente + Math.max(k,0.4) * NODE_H;
    lastLayout.yMostriAbs = yMostriAbs;
    lastLayout.fase = fase;
    lastLayout.k = k;
    const mEl = layer.querySelector('.node-mostri');
    if(mEl){
      mEl.style.top = yMostriAbs + 'px';
      const circle = mEl.querySelector('.node-circle');
      const label  = mEl.querySelector('.node-label');
      let cc='nc-mostri-lon', icon='👾', top='Mostri', bot=`${k} nodi`;
      if(fase==='calcagna'){ cc='nc-mostri-cal'; icon='👹'; top='Alle calcagna'; bot=''; }
      if(fase==='raggiunti'){ cc='nc-mostri-rag'; icon='👹'; top='Raggiunti!'; bot=''; }
      if(circle){ circle.className = 'node-circle '+cc; circle.textContent = icon; }
      if(label){ label.innerHTML = `${top}${bot?`<br><span style="color:#303050;font-size:7px">${bot}</span>`:''}`; }
    }
  }
}

function aggiornaFloating(){
  if(!state || !lastLayout) return;
  const area = document.getElementById('tree-area');
  const viewH = area.clientHeight;
  const fase = faseMostri();
  const k = distanzaNodi();
  const yMostriAbs = lastLayout.yMostriAbs;
  const viewBottomAbs = area.scrollTop + viewH;
  const fuoriSchermo = yMostriAbs > viewBottomAbs - 20;
  const fm = document.getElementById('floating-monsters');
  if(!fm) return;
  if(!state.gameOver && fase!=='raggiunti' && fuoriSchermo){
    fm.style.display = 'flex';
    document.getElementById('fm-label').textContent = `mostri · ${k} nodi`;
  } else {
    fm.style.display = 'none';
  }
}

// Chiamato dal tick: aggiorna solo HUD/mostri/floating, niente ricostruzione né scroll forzato
function tickUpdate(){
  aggiornaHUDeMostri();
  aggiornaFloating();
}

function renderLog(){
  const entries=document.getElementById('log-entries');
  entries.innerHTML='';
  state.percorso.forEach((step,i) => {
    const isC=(i===state.percorso.length-1);
    const dur=step.tEnd-step.tStart;
    let cls = step.tipo==='fisso' ? 'log-fisso' : (step.tipo==='vuoto' ? 'log-vuoto' : 'log-scelta');
    const div=document.createElement('div');
    div.className=`log-entry ${cls} ${isC?'log-corrente':''}`;
    const nome = step.tipo==='vuoto' ? '· tempo vuoto' : `${step.data.icon} ${step.data.label}`;
    div.innerHTML=`
      <div class="log-ora">${fmt(step.tStart)}</div>
      <div class="log-nome">${nome}</div>
      ${dur>0?`<div class="log-dur">${dur} min</div>`:''}`;
    entries.appendChild(div);
  });
  entries.scrollTop=entries.scrollHeight;
  document.getElementById('log-now-ora').textContent=fmt(state.tCorrente);
}

window.addEventListener('resize', ()=>{ if(state) render(); });
restart();
</script>
